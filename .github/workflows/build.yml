name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  # ── 构建离线 bundle（各平台独立，产物上传到 Release）────────────────────────
  build-bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: macos
            arch: arm64
            label: macOS-arm64
          - platform: macos-13
            os: macos
            arch: x64
            label: macOS-x64
          - platform: windows-latest
            os: windows
            arch: x64
            label: Windows-x64
          - platform: ubuntu-22.04
            os: linux
            arch: x64
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Bundle (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare openclaw bundle
        env:
          OPENCLAW_BUNDLE_NODE_ARCH: ${{ matrix.arch }}
          OPENCLAW_BUNDLE_SKIP_VERIFY: ${{ (matrix.arch == 'arm64' && runner.arch == 'X64') && '1' || '0' }}
        run: node scripts/prepare-openclaw-bundle.mjs

      - name: Pack bundle as tar.gz (Unix)
        if: matrix.os != 'windows'
        run: |
          cd src-tauri/bundle/resources
          tar -czf openclaw-bundle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz openclaw-bundle/
          mv openclaw-bundle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz ../../../

      - name: Pack bundle as tar.gz (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $bundlePath = "src-tauri/bundle/resources/openclaw-bundle"
          if (-not (Test-Path $bundlePath)) { throw "Bundle directory not found: $bundlePath" }
          Set-Location src-tauri/bundle/resources
          tar -czf openclaw-bundle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz openclaw-bundle/
          Move-Item openclaw-bundle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz ../../../

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: openclaw-bundle-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  # ── 构建 App（不内嵌 bundle）────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            label: macOS
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            label: Windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      # Tauri build 要求 bundle/resources/openclaw-bundle 目录存在（即使为空）
      - name: Ensure bundle placeholder exists
        run: mkdir -p src-tauri/bundle/resources/openclaw-bundle

      # app 构建跳过 bundle 准备（bundle 单独发布）
      - name: Build Tauri app (macOS Universal)
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCLAW_DESKTOP_SKIP_BUNDLE_PREP: 1
        with:
          args: --target universal-apple-darwin

      - name: Build Tauri app
        if: matrix.platform != 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCLAW_DESKTOP_SKIP_BUNDLE_PREP: 1

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── Dev 预发布 ────────────────────────────────────────────────────────────────
  dev-release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build, build-bundle]
    runs-on: ubuntu-latest
    name: Dev Release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create/Update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Dev Build"
          prerelease: true
          body: |
            自动构建自 `main` 分支，commit: ${{ github.sha }}

            **安装说明：**
            1. 下载对应平台的 App 安装包
            2. 首次运行时，App 会自动从本 Release 下载对应平台的 `openclaw-bundle-*.tar.gz` 并安装

            > 这是开发版本，不保证稳定性。正式版请查看 [Releases](../../releases)。
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/openclaw-bundle-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 正式 Release ──────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-bundle]
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/openclaw-bundle-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
